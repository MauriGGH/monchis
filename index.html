<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Monchis — Algo es tuyo</title>
  <meta property="og:title" content="Alguien guardó esto para ti">
  <meta property="og:description" content="Tienes algo gratis esperándote. Entra antes de que expire.">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #100400;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(180,40,0,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(230,100,0,0.1) 0%, transparent 50%),
        #0e0300;
      gap: 0;
    }

    .brand {
      font-size: 11px;
      letter-spacing: 6px;
      color: rgba(255,140,0,0.5);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .hook {
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .offer-label {
      font-size: clamp(11px, 2.5vw, 13px);
      letter-spacing: 5px;
      color: rgba(255,140,0,0.6);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .offer-main {
      font-family: 'Oswald', Impact, sans-serif;
      font-size: clamp(76px, 24vw, 120px);
      font-weight: 700;
      line-height: 0.85;
      color: #fff;
      text-shadow:
        0 0 60px rgba(220,80,0,0.35),
        0 4px 0 rgba(0,0,0,0.4);
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .offer-item {
      font-size: clamp(20px, 6vw, 30px);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,140,0,0.35);
      margin: 0 auto 20px;
    }

    .condition {
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .urgency {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(220,80,0,0.8);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .urgency::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(220,80,0,0.9);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 17px 24px;
      background: #25D366;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 30px rgba(37,211,102,0.25);
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-wa:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(37,211,102,0.3);
    }

    .btn-wa svg { width: 20px; height: 20px; flex-shrink: 0; }

    .footer-note {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.5px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="brand">— Monchis —</p>
    <p class="hook">Alguien guardó esto para ti.</p>
    <p class="offer-label">Tienes</p>
    <div class="offer-main">PAPAS<br>GRATIS</div>
    <p class="offer-item">🍟 100% gratis</p>
    <div class="divider"></div>
    <p class="condition">
      Con cualquier pedido de $250 o más<br>
      Muestra esta pantalla al ordenar
    </p>
    <span class="urgency">Solo por tiempo limitado</span>
    <a
      href="https://wa.me/523123391898?text=Hola%2C%20vi%20el%20flyer%20y%20quiero%20pedir%20%F0%9F%8D%9F%20Papas%20gratis"
      class="btn-wa"
      target="_blank"
      rel="noopener"
    >
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Reclamar por WhatsApp
    </a>
    <p class="footer-note">
      312 339 1898 · Monchis Colima<br>
      Alitas a domicilio
    </p>
  </div>
</body>
</html>
