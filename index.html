<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Monchis — Algo es tuyo 🍟</title>
  <meta property="og:title" content="👀 Alguien guardó esto para ti">
  <meta property="og:description" content="Tienes PAPAS GRATIS esperándote. Entra antes de que se acaben.">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      background: #FF4500;
      background: linear-gradient(160deg, #FF6B00 0%, #FF2D00 40%, #C0000A 100%);
      color: #fff;
    }

    /* ── PARTÍCULAS DE FONDO ── */
    .bg-dots {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px 40px;
      text-align: center;
    }

    /* ── BADGE TOP ── */
    .badge-top {
      background: rgba(0,0,0,0.25);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      margin-bottom: 28px;
      backdrop-filter: blur(8px);
    }

    /* ── HOOK TEXT ── */
    .hook {
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    /* ── OFERTA PRINCIPAL ── */
    .offer-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .offer-bg-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Bangers', cursive;
      font-size: clamp(130px, 38vw, 200px);
      color: rgba(0,0,0,0.08);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 2px;
    }

    .offer-main {
      font-family: 'Bangers', cursive;
      font-size: clamp(72px, 22vw, 120px);
      line-height: 0.9;
      letter-spacing: 3px;
      color: #fff;
      text-shadow:
        4px 4px 0px rgba(0,0,0,0.3),
        0 0 40px rgba(255,200,0,0.3);
      position: relative;
      z-index: 1;
    }

    .offer-item {
      font-family: 'Bangers', cursive;
      font-size: clamp(38px, 12vw, 60px);
      letter-spacing: 4px;
      color: #FFE000;
      text-shadow:
        2px 2px 0px rgba(0,0,0,0.4),
        0 0 20px rgba(255,220,0,0.4);
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    /* ── EMOJI DECORATIVO ── */
    .emoji-row {
      font-size: clamp(28px, 8vw, 40px);
      margin-bottom: 20px;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ── CARD DE CONDICIONES ── */
    .card {
      background: rgba(0,0,0,0.2);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 20px;
      backdrop-filter: blur(6px);
    }

    .card p {
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
    }

    .card .highlight {
      color: #FFE000;
    }

    /* ── URGENCIA ── */
    .urgency {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.5px;
      color: #FFE000;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #FFE000;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    /* ── BOTÓN WHATSAPP ── */
    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 18px 24px;
      background: #25D366;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.5px;
      box-shadow:
        0 8px 0 #1aab52,
        0 12px 20px rgba(0,0,0,0.3);
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .btn-wa:active {
      transform: translateY(4px);
      box-shadow:
        0 4px 0 #1aab52,
        0 6px 12px rgba(0,0,0,0.3);
    }

    .btn-wa svg { width: 22px; height: 22px; flex-shrink: 0; }

    /* ── BRAND FOOTER ── */
    .footer {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .footer .brand-name {
      font-family: 'Bangers', cursive;
      font-size: 28px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.5);
    }

    .footer .brand-sub {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg-dots"></div>
  <div class="page">

    <div class="badge-top">👀 Solo para quien tenga el flyer</div>

    <p class="hook">Alguien guardó esto para ti</p>

    <div class="offer-wrap">
      <div class="offer-bg-text">GRATIS</div>
      <div class="offer-main">PAPAS</div>
      <div class="offer-item">🍟 GRATIS 🍟</div>
    </div>

    <div class="emoji-row">🔥🔥🔥</div>

    <div class="card">
      <p>
        Con tu pedido de <span class="highlight">$250 o más</span><br>
        Muestra esta pantalla al ordenar<br>
        y listo ✅
      </p>
    </div>

    <div class="urgency">
      <div class="dot"></div>
      Tiempo limitado · Quedan pocos
    </div>

    <a
      href="https://wa.me/523123391898?text=Hola%2C%20vi%20el%20flyer%20y%20quiero%20pedir%20%F0%9F%8D%9F%20Papas%20gratis"
      class="btn-wa"
      target="_blank"
      rel="noopener"
    >
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      ¡Quiero mis papas gratis!
    </a>

    <div class="footer">
      <span class="brand-name">MONCHIS</span>
      <span class="brand-sub">Alitas a domicilio · 312 339 1898</span>
    </div>

  </div>
</body>
</html>
